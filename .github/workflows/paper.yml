name: Paper Trade

on:
  # External cron service (cron-job.org) hits the GitHub API to fire this,
  # because GitHub's own scheduled cron is unreliable. Backup schedule kept
  # in case external service ever goes down.
  repository_dispatch:
    types: [paper-trade]
  workflow_dispatch: {}
  schedule:
    - cron: "0 */2 * * *"   # fallback every 2 hours

permissions:
  contents: write

concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run V3 cycle (z>=5, dte>=30, stop-loss, $30 stake)
        run: python3 -u paper_trader.py --single

      - name: Print status summary
        if: always()
        run: python3 paper_trader.py --status || true

      - name: Regenerate dashboard
        if: always()
        run: python3 generate_dashboard.py || true

      - name: Commit state + dashboard
        if: always()
        run: |
          git config user.name "paper-trader-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f paper_state.json paper_trades.jsonl paper_signals.jsonl paper_cycles.jsonl dashboard.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes this cycle"
          else
            git commit -m "cycle $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main || true
            git push origin main || true
          fi
